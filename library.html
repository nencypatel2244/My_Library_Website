	<script>
		document.addEventListener("DOMContentLoaded", () => {
            const search = document.querySelector(".search-bar input"),
                images = document.querySelectorAll(".image-box");

            search.addEventListener("keyup", (e) => {
                const searchValue = search.value.toLowerCase();
                images.forEach((image) => {
                    if (image.dataset.name.toLowerCase().includes(searchValue)) {
                        image.style.display = "inline-block";
                    } else {
                        image.style.display = "none";
                    }
                });
            });
        });
	</script>

<script>
function toggleCart() {
    let cart = document.querySelector(".cart"); 
    let searchBar = document.querySelector(".search-bar"); // Select the search bar

    cart.classList.toggle("open");

    if (cart.classList.contains("open")) {
        searchBar.style.visibility = "hidden"; // Hide search bar
        searchBar.style.position = "absolute"; // Remove space it takes
    } else {
        searchBar.style.visibility = "visible"; // Show search bar
        searchBar.style.position = "relative"; 
    }
}
</script>
<script>
	let cart = [];

function addToCart(id) {
    const productElement = document.querySelector(`.product[data-id='${id}']`);
    const name = productElement.getAttribute("data-name");
    const price = parseInt(productElement.getAttribute("data-price"));

    let item = cart.find(item => item.id === id);
    if (item) {
        item.quantity += 1;
    } else {
        cart.push({ id, name, price, quantity: 1 });
    }

    updateCart();
}

function updateCart() {
    const cartList = document.getElementById("cart-items");
    const cartCount = document.getElementById("cart-count");
    const totalPriceElement = document.getElementById("total-price");

    cartList.innerHTML = "";
    let totalPrice = 0;

    cart.forEach(item => {
        let li = document.createElement("li");
        li.innerHTML = `
            ${item.name} - ${item.price} x ${item.quantity}
            <button onclick="removeFromCart(${item.id})">🗑</button>
        `;
        cartList.appendChild(li);
        totalPrice += item.price * item.quantity;
    });

    cartCount.textContent = cart.reduce((sum, item) => sum + item.quantity, 0);
    totalPriceElement.textContent = totalPrice;
}

function removeFromCart(id) {
    cart = cart.filter(item => item.id !== id);
    updateCart();
}

function toggleCart() {
    document.querySelector(".cart").classList.toggle("open");
}
</script>
